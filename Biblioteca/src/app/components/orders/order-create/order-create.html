<section class="page">
  <div class="shell-form">
    <header class="header">
      <div class="hero-mini">
        <h1>Nuevo Pedido</h1>
        <p class="subtitle">Selecciona un producto y la cantidad deseada.</p>
      </div>
      <a routerLink="/catalog" class="link-back">← Volver al catálogo</a>
    </header>

    @if (error) {
      <div class="error-banner">{{ error }}</div>
    }

    <form class="order-card" [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-content">
        <label class="field">
          <span>Producto</span>
          <div class="select-wrapper">
            <select formControlName="productId">
              <option [ngValue]="null">Haz clic para seleccionar...</option>
              @for (p of products; track p.id) {
                <option [ngValue]="p.id">
                  {{ p.titulo }} — (Disponible: {{ p.stock }})
                </option>
              }
            </select>
          </div>
        </label>

        <label class="field">
          <span>Cantidad a pedir</span>
          <input type="number" formControlName="cantidad" min="1" placeholder="0" />
        </label>
      </div>

      <div class="form-footer">
        <button type="submit" [disabled]="loading || form.invalid" class="btn-submit">
          {{ loading ? 'Procesando...' : 'Confirmar Pedido' }}
        </button>
      </div>
    </form>
    
    <p class="security-note">🔒 Transacción protegida por el servicio de autenticación.</p>
  </div>
</section>
